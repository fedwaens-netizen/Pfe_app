version: '3.8'

services:
  web:
    build: .
    container_name: recommendation_web
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:Kxsd2882@db:5432/touristes_db
    depends_on:
      - db

  db:
    image: postgres:13
    container_name: recommendation_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Kxsd2882
      - POSTGRES_DB=touristes_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
