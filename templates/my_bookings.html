{% extends "base.html" %}
{% block content %}

<style>
/* ─── Premium My Bookings Styles ─── */
.bookings-hero {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
    text-align: center;
}
.bookings-hero h1 {
    font-size: 2.2rem;
    font-weight: 800;
    color: #fff;
    margin-bottom: 0.5rem;
}
.bookings-hero p {
    color: #94a3b8;
    font-size: 1rem;
    margin-bottom: 0;
}

/* ─── Filtering/Tabs ─── */
.filter-tabs {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 2rem;
}
.tab-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #94a3b8;
    padding: 0.6rem 1.5rem;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
.tab-btn:hover {
    background: rgba(255,255,255,0.1);
}
.tab-btn.active {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
}

/* ─── Booking Cards Grid ─── */
.bookings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
}

.b-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 1.5rem;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    display: flex;
    flex-direction: column;
    position: relative;
}
.b-card:hover {
    background: rgba(255, 255, 255, 0.07);
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.b-type-badge {
    position: absolute;
    top: -12px;
    right: 20px;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}
.b-type-badge.hotel {
    background: linear-gradient(135deg, #ec4899, #f43f5e);
    color: #fff;
}
.b-type-badge.taxi {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #0f172a;
}

.b-header {
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}
.b-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 0.2rem;
    line-height: 1.3;
}
.b-subtitle {
    font-size: 0.85rem;
    color: #8b5cf6;
    font-weight: 500;
}
.b-subtitle.taxi-sub {
    color: #fbbf24;
}

.b-details {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    flex-grow: 1;
}
.b-detail-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
}
.b-icon {
    font-size: 1.1rem;
    width: 24px;
    text-align: center;
    color: #94a3b8;
}
.b-text {
    font-size: 0.9rem;
    color: #cbd5e1;
}

.b-footer {
    margin-top: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.b-price {
    font-size: 1.25rem;
    font-weight: 800;
    color: #22c55e;
}
.b-status {
    padding: 0.3rem 0.7rem;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
}
.b-status.Confirmée {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
    border: 1px solid rgba(34, 197, 94, 0.3);
}
.b-status.Annulée {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.3);
}

.b-actions {
    margin-top: 1rem;
    text-align: right;
}
.btn-cancel {
    background: transparent;
    border: 1px solid #ef4444;
    color: #ef4444;
    padding: 0.4rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-cancel:hover {
    background: #ef4444;
    color: #fff;
}

/* ─── Empty & Loading States ─── */
.state-box {
    text-align: center;
    padding: 4rem 1rem;
    background: rgba(255,255,255,0.03);
    border-radius: 20px;
    border: 1px dashed rgba(255,255,255,0.1);
}
.state-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
}
.state-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 0.5rem;
}
.state-desc {
    color: #94a3b8;
}
.spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(59, 130, 246, 0.2);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 1.5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
.toast { min-width: 270px; padding: 0.85rem 1.1rem; border-radius: 12px; font-size: 0.86rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; animation: slideIn 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.toast.success { background: #065f46; border: 1px solid #059669; color: #a7f3d0; }
.toast.error   { background: #7f1d1d; border: 1px solid #dc2626; color: #fca5a5; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateX(30px); } }

</style>

<div class="bookings-hero">
    <h1>Mes Réservations</h1>
    <p>Retrouvez l'historique complet de vos voyages et déplacements.</p>
</div>

<div class="filter-tabs">
    <button class="tab-btn active" data-filter="all">Tous</button>
    <button class="tab-btn" data-filter="hotel">Hôtels</button>
    <button class="tab-btn" data-filter="taxi">Taxis</button>
</div>

<div id="contentArea">
    <div class="state-box">
        <div class="spinner"></div>
        <div class="state-title">Chargement de votre historique...</div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let allBookings = [];

document.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
        return;
    }

    try {
        const response = await fetch('/api/my-bookings', {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.status === 401) {
            showToast('Session expirée. Redirection...', 'error');
            setTimeout(() => window.location.href = '/login', 1500);
            return;
        }

        allBookings = await response.json();
        renderBookings('all');

    } catch (err) {
        console.error('Error:', err);
        document.getElementById('contentArea').innerHTML = `
            <div class="state-box">
                <div class="state-icon">⚠️</div>
                <div class="state-title">Erreur de connexion</div>
                <div class="state-desc">Impossible de charger vos réservations.</div>
            </div>`;
    }
});

// Setup tab filters
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderBookings(e.target.dataset.filter);
    });
});

function renderBookings(filter) {
    const content = document.getElementById('contentArea');
    
    // Filter logic
    const filtered = allBookings.filter(b => filter === 'all' || b.type === filter);

    if (filtered.length === 0) {
        content.innerHTML = `
            <div class="state-box">
                <div class="state-icon">📭</div>
                <div class="state-title">Aucune réservation</div>
                <div class="state-desc">Vous n'avez pas de réservations dans cette catégorie pour le moment.</div>
            </div>`;
        return;
    }

    let html = '<div class="bookings-grid">';
    
    filtered.forEach(b => {
        const isHotel = b.type === 'hotel';
        const typeLabel = isHotel ? 'HÔTEL' : 'TAXI';
        const badgeClass = isHotel ? 'hotel' : 'taxi';
        const subtitleClass = isHotel ? '' : 'taxi-sub';
        
        // Decide what to show in details rows
        let rowsHtml = '';
        if (isHotel) {
            rowsHtml = `
                <div class="b-detail-row">
                    <span class="b-icon">📅</span>
                    <span class="b-text">${b.display_date}</span>
                </div>
            `;
        } else {
            rowsHtml = `
                <div class="b-detail-row">
                    <span class="b-icon">🕒</span>
                    <span class="b-text">${b.display_date}</span>
                </div>
                ${b.taxi_code ? `
                <div class="b-detail-row">
                    <span class="b-icon">🎫</span>
                    <span class="b-text" style="font-family:monospace">Code: ${b.taxi_code}</span>
                </div>` : ''}
            `;
        }

        const canCancel = b.status === "Confirmée";
        const actionHtml = canCancel ? `
            <div class="b-actions">
                <button class="btn-cancel" onclick="cancelItem('${b.type}', ${b.id})">Annuler</button>
            </div>
        ` : '';

        html += `
            <div class="b-card">
                <div class="b-type-badge ${badgeClass}">${typeLabel}</div>
                
                <div class="b-header">
                    <div class="b-title">${b.title}</div>
                    <div class="b-subtitle ${subtitleClass}">${b.subtitle}</div>
                </div>
                
                <div class="b-details">
                    ${rowsHtml}
                </div>
                
                <div class="b-footer">
                    <div class="b-price">${b.price.toFixed(2)} <span style="font-size:0.8rem;color:#64748b">MAD</span></div>
                    <div class="b-status ${b.status}">${b.status}</div>
                </div>
                
                ${actionHtml}
            </div>
        `;
    });

    html += '</div>';
    content.innerHTML = html;
}

async function cancelItem(type, id) {
    if (!confirm("Voulez-vous vraiment annuler cette réservation ?")) return;

    const token = localStorage.getItem('token');
    if (!token) return;

    // Route dynamically based on type
    let url = '';
    if (type === 'hotel') url = `/api/bookings/${id}/cancel`;
    if (type === 'taxi')  url = `/api/taxis/${id}/cancel`;

    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Erreur lors de l'annulation");

        showToast("Réservation annulée avec succès.", "success");
        
        // Update local state to immediately reflect the change without full reload
        const idx = allBookings.findIndex(b => b.id === id && b.type === type);
        if (idx !== -1) {
            allBookings[idx].status = "Annulée";
            // Re-render currently active tab
            const activeTab = document.querySelector('.tab-btn.active').dataset.filter;
            renderBookings(activeTab);
        }

    } catch (err) {
        showToast(err.message, "error");
    }
}

function showToast(msg, type = 'success', duration = 4000) {
    const icons = { success: '✓', error: '✕' };
    const tc = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span style="font-weight:800">${icons[type]}</span> ${msg}`;
    tc.appendChild(t);
    setTimeout(() => {
        t.style.animation = 'fadeOut 0.3s ease forwards';
        setTimeout(() => t.remove(), 300);
    }, duration);
}
</script>

{% endblock %}
